<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jambu — Presentasi Interaktif</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #2E7D32;
    --green-main: #4CAF50;
    --green-light: #A5D6A7;
    --green-pale: #E8F5E9;
    --green-mint: #C8E6C9;
    --pink-soft: #F48FB1;
    --pink-pale: #FCE4EC;
    --white: #FFFFFF;
    --cream: #F9FBF7;
    --text-dark: #1B5E20;
    --text-mid: #388E3C;
    --text-light: #66BB6A;
    --shadow-green: rgba(76,175,80,0.25);
    --shadow-deep: rgba(46,125,50,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; scroll-snap-type: y mandatory; overflow-y: scroll; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    cursor: default;
  }

  /* ===== SLIDES ===== */
  .slide {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    scroll-snap-align: start;
    overflow: hidden;
    padding: 60px 40px;
  }

  /* ===== NAVIGATION ===== */
  .nav-dots {
    position: fixed;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .nav-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green-light);
    border: 2px solid var(--green-main);
    cursor: pointer;
    transition: all .35s ease;
  }

  .nav-dot.active, .nav-dot:hover {
    background: var(--green-main);
    transform: scale(1.4);
  }

  .nav-arrows {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    z-index: 999;
  }

  .nav-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    border: 2px solid var(--green-light);
    color: var(--green-deep);
    font-size: 18px;
    cursor: pointer;
    transition: all .3s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px var(--shadow-green);
  }

  .nav-btn:hover {
    background: var(--green-main);
    color: white;
    transform: scale(1.1);
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes floatY {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-18px) rotate(3deg); }
  }

  @keyframes floatSlow {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  @keyframes glowPulse {
    0%,100% { text-shadow: 0 0 30px rgba(76,175,80,0.5), 0 0 60px rgba(76,175,80,0.25); }
    50% { text-shadow: 0 0 50px rgba(76,175,80,0.8), 0 0 100px rgba(76,175,80,0.4); }
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes ripple {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  .animate-in {
    animation: fadeSlideUp 0.8s ease forwards;
    opacity: 0;
  }

  .delay-1 { animation-delay: 0.15s; }
  .delay-2 { animation-delay: 0.3s; }
  .delay-3 { animation-delay: 0.45s; }
  .delay-4 { animation-delay: 0.6s; }
  .delay-5 { animation-delay: 0.75s; }

  /* ===== BACKGROUND ELEMENTS ===== */
  .bg-blob {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .leaf-deco {
    position: absolute;
    pointer-events: none;
    z-index: 0;
    opacity: 0.08;
  }

  /* ===== SLIDE 1: HERO ===== */
  #slide-1 {
    background: linear-gradient(135deg, #E8F5E9 0%, #F1F8E9 40%, #FFFFFF 70%, #FCE4EC 100%);
    flex-direction: row;
    gap: 80px;
    align-items: center;
    justify-content: center;
  }

  #slide-1 .bg-blob-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(165,214,167,0.4) 0%, transparent 70%);
    top: -100px; left: -100px;
  }

  #slide-1 .bg-blob-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(244,143,177,0.2) 0%, transparent 70%);
    bottom: -80px; right: -60px;
  }

  .hero-text { position: relative; z-index: 2; text-align: left; max-width: 580px; }

  .hero-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--green-main), var(--green-light));
    color: white;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 20px;
    animation: fadeSlideUp 0.6s ease forwards;
    box-shadow: 0 4px 15px var(--shadow-green);
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(80px, 10vw, 140px);
    font-weight: 900;
    line-height: 0.9;
    background: linear-gradient(135deg, #1B5E20 0%, #4CAF50 40%, #81C784 70%, #4CAF50 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite, fadeSlideUp 0.8s ease 0.1s forwards;
    opacity: 0;
  }

  .hero-subtitle {
    font-size: clamp(16px, 2vw, 22px);
    font-weight: 300;
    color: var(--text-mid);
    margin-top: 16px;
    letter-spacing: 1px;
    animation: fadeSlideUp 0.8s ease 0.2s forwards;
    opacity: 0;
  }

  .hero-subtitle span {
    color: var(--pink-soft);
    font-weight: 600;
  }

  .hero-divider {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--green-main), var(--pink-soft));
    border-radius: 2px;
    margin: 24px 0;
    animation: fadeSlideUp 0.8s ease 0.3s forwards;
    opacity: 0;
  }

  .hero-desc {
    font-size: 15px;
    color: #558B2F;
    line-height: 1.7;
    animation: fadeSlideUp 0.8s ease 0.4s forwards;
    opacity: 0;
  }

  .hero-group {
    display: flex; align-items: center; gap: 12px;
    margin-top: 32px;
    animation: fadeSlideUp 0.8s ease 0.5s forwards;
    opacity: 0;
  }

  .hero-group .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--green-main), var(--green-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    border: 2px solid white;
    box-shadow: 0 2px 10px var(--shadow-green);
  }

  .hero-group-text { font-size: 13px; color: var(--text-mid); }
  .hero-group-text strong { display: block; color: var(--text-dark); font-size: 14px; }

  .hero-img-container {
    position: relative; z-index: 2;
    flex-shrink: 0;
  }

  .hero-img-wrap {
    width: clamp(280px, 28vw, 420px);
    height: clamp(280px, 28vw, 420px);
    position: relative;
    animation: floatY 5s ease-in-out infinite;
  }

  .hero-img-circle {
    width: 100%; height: 100%;
    border-radius: 60% 40% 55% 45% / 45% 55% 40% 60%;
    background: linear-gradient(135deg, var(--green-light), var(--green-mint), var(--green-pale));
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(76,175,80,0.35), 0 10px 30px rgba(76,175,80,0.2);
    transition: all 0.5s ease;
  }

  .hero-img-circle img {
    width: 110%; height: 110%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  .hero-img-circle:hover img { transform: scale(1.08); }

  .hero-orb {
    position: absolute;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--green-main), var(--green-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 8px 25px var(--shadow-green);
    animation: floatSlow 3s ease-in-out infinite;
  }

  .hero-orb-1 { width: 70px; height: 70px; top: -10px; right: -10px; animation-delay: 0.5s; }
  .hero-orb-2 { width: 50px; height: 50px; bottom: 30px; left: -20px; animation-delay: 1s; background: linear-gradient(135deg, var(--pink-soft), #F48FB1); }
  .hero-orb-3 { width: 40px; height: 40px; top: 50%; right: -30px; animation-delay: 1.5s; }

  /* ===== SECTION TITLE ===== */
  .section-header { text-align: center; margin-bottom: 50px; position: relative; z-index: 2; }

  .section-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--green-main);
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 800;
    color: var(--text-dark);
    line-height: 1.1;
  }

  .section-title .accent {
    background: linear-gradient(135deg, var(--green-main), #81C784);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-underline {
    width: 80px; height: 4px;
    background: linear-gradient(90deg, var(--green-main), var(--pink-soft));
    border-radius: 2px;
    margin: 16px auto 0;
  }

  /* ===== SLIDE 2: DESKRIPSI ===== */
  #slide-2 {
    background: linear-gradient(160deg, #FFFFFF 0%, #E8F5E9 50%, #F1F8E9 100%);
  }

  .desc-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
    max-width: 1200px;
    width: 100%;
    position: relative; z-index: 2;
  }

  .desc-content { }

  .desc-img-stack { position: relative; }

  .desc-img-main {
    width: 100%;
    max-width: 480px;
    aspect-ratio: 4/5;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(46,125,50,0.2);
    transition: transform 0.5s ease;
  }

  .desc-img-main:hover { transform: scale(1.02) rotate(1deg); }
  .desc-img-main img { width: 100%; height: 100%; object-fit: cover; }

  .desc-img-small {
    position: absolute;
    width: 160px; height: 160px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(46,125,50,0.25);
    border: 4px solid white;
    transition: transform 0.5s ease;
    bottom: -20px; right: -20px;
  }

  .desc-img-small:hover { transform: scale(1.05); }
  .desc-img-small img { width: 100%; height: 100%; object-fit: cover; }

  .desc-text p {
    font-size: 16px;
    line-height: 1.9;
    color: #4E6B3A;
    margin-bottom: 20px;
  }

  .desc-stat-row {
    display: flex; gap: 20px; margin-top: 30px;
  }

  .desc-stat {
    flex: 1;
    background: linear-gradient(135deg, rgba(165,214,167,0.3), rgba(200,230,201,0.2));
    border: 1px solid rgba(165,214,167,0.5);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    transition: all 0.3s;
  }

  .desc-stat:hover {
    background: linear-gradient(135deg, rgba(76,175,80,0.15), rgba(165,214,167,0.25));
    transform: translateY(-4px);
    box-shadow: 0 10px 30px var(--shadow-green);
  }

  .desc-stat .num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--green-main);
  }

  .desc-stat .label { font-size: 12px; color: var(--text-mid); margin-top: 4px; }

  /* ===== SLIDE 3: VARIAN ===== */
  #slide-3 {
    background: linear-gradient(145deg, #F1F8E9 0%, #E8F5E9 50%, #FFFFFF 100%);
    flex-direction: column;
  }

  .variant-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    max-width: 1200px;
    width: 100%;
    position: relative; z-index: 2;
  }

  .variant-card {
    background: white;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(76,175,80,0.1);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    border: 1px solid rgba(165,214,167,0.3);
  }

  .variant-card:hover {
    transform: translateY(-12px) scale(1.02);
    box-shadow: 0 30px 60px rgba(76,175,80,0.25);
  }

  .variant-img {
    width: 100%;
    aspect-ratio: 1;
    overflow: hidden;
    position: relative;
  }

  .variant-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
  }

  .variant-card:hover .variant-img img { transform: scale(1.12); }

  .variant-img-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(46,125,50,0.3) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .variant-card:hover .variant-img-overlay { opacity: 1; }

  .variant-info { padding: 20px; }

  .variant-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 10px;
    background: var(--green-pale);
    color: var(--green-deep);
    margin-bottom: 8px;
  }

  .variant-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .variant-desc { font-size: 13px; color: #6A8F6A; line-height: 1.5; }

  .variant-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--green-pale);
  }

  .variant-stars { color: #FFC107; font-size: 12px; }
  .variant-arrow {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--green-pale);
    display: flex; align-items: center; justify-content: center;
    color: var(--green-deep);
    font-size: 14px;
    transition: all 0.3s;
  }

  .variant-card:hover .variant-arrow {
    background: var(--green-main);
    color: white;
  }

  /* ===== SLIDE 4: MANFAAT ===== */
  #slide-4 {
    background: linear-gradient(135deg, #2E7D32 0%, #388E3C 40%, #4CAF50 100%);
    flex-direction: column;
  }

  #slide-4 .section-title { color: white; }
  #slide-4 .section-label { color: var(--green-light); }
  #slide-4 .section-underline { background: linear-gradient(90deg, var(--green-light), var(--pink-soft)); }

  .benefit-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    max-width: 1200px;
    width: 100%;
    position: relative; z-index: 2;
  }

  .benefit-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 28px;
    padding: 36px 24px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
  }

  .benefit-card:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 25px 60px rgba(0,0,0,0.2);
    border-color: rgba(255,255,255,0.4);
  }

  .benefit-icon {
    font-size: 50px;
    margin-bottom: 20px;
    display: block;
    animation: floatSlow 3s ease-in-out infinite;
  }

  .benefit-card:nth-child(2) .benefit-icon { animation-delay: 0.5s; }
  .benefit-card:nth-child(3) .benefit-icon { animation-delay: 1s; }
  .benefit-card:nth-child(4) .benefit-icon { animation-delay: 1.5s; }

  .benefit-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: white;
    margin-bottom: 12px;
  }

  .benefit-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    line-height: 1.7;
  }

  .benefit-bar {
    margin-top: 20px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
  }

  .benefit-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-light), white);
    border-radius: 2px;
    transform-origin: left;
    transition: width 1s ease 0.5s;
    width: 0;
  }

  .benefit-card.visible .benefit-bar-fill { width: var(--pct); }

  #slide-4 .bg-blob-3 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation: spin 30s linear infinite;
  }

  /* ===== SLIDE 5: OLAHAN ===== */
  #slide-5 {
    background: linear-gradient(160deg, #FFFFFF 0%, #F9FBF7 50%, #E8F5E9 100%);
    flex-direction: column;
  }

  .olahan-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    max-width: 1200px;
    width: 100%;
    position: relative; z-index: 2;
  }

  .olahan-card {
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(76,175,80,0.12);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    aspect-ratio: 3/4;
  }

  .olahan-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 30px 70px rgba(76,175,80,0.3);
  }

  .olahan-img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
  }

  .olahan-card:hover .olahan-img { transform: scale(1.12); }

  .olahan-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(27,94,32,0.85) 0%, rgba(27,94,32,0.3) 50%, transparent 100%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 24px;
    transition: all 0.4s;
  }

  .olahan-card:hover .olahan-overlay {
    background: linear-gradient(to top, rgba(27,94,32,0.95) 0%, rgba(27,94,32,0.5) 60%, transparent 100%);
  }

  .olahan-emoji { font-size: 28px; margin-bottom: 8px; }

  .olahan-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: white;
    margin-bottom: 4px;
  }

  .olahan-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    transform: translateY(10px);
    opacity: 0;
    transition: all 0.4s ease 0.1s;
  }

  .olahan-card:hover .olahan-sub {
    transform: translateY(0);
    opacity: 1;
  }

  .olahan-badge {
    position: absolute;
    top: 16px; right: 16px;
    background: white;
    border-radius: 12px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 700;
    color: var(--green-deep);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transform: translateY(-5px);
    opacity: 0;
    transition: all 0.4s ease;
  }

  .olahan-card:hover .olahan-badge {
    transform: translateY(0);
    opacity: 1;
  }

  /* ===== SLIDE 6: PENUTUP ===== */
  #slide-6 {
    background: linear-gradient(145deg, #1B5E20 0%, #2E7D32 30%, #388E3C 60%, #4CAF50 100%);
    flex-direction: column;
    text-align: center;
  }

  .outro-content { position: relative; z-index: 2; }

  .outro-leaf {
    font-size: 80px;
    display: block;
    animation: floatY 4s ease-in-out infinite;
    margin-bottom: 20px;
  }

  .outro-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(60px, 8vw, 100px);
    font-weight: 900;
    color: white;
    line-height: 1;
    animation: glowPulse 3s ease-in-out infinite;
    text-shadow: 0 0 40px rgba(165,214,167,0.6), 0 0 80px rgba(76,175,80,0.4);
  }

  .outro-sub {
    font-size: clamp(18px, 2.5vw, 28px);
    color: rgba(255,255,255,0.85);
    margin-top: 20px;
    font-weight: 300;
    letter-spacing: 2px;
  }

  .outro-divider {
    width: 100px; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    border-radius: 2px;
    margin: 30px auto;
  }

  .outro-team {
    font-size: 16px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 1px;
  }

  .outro-circles {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 600px; height: 600px;
    pointer-events: none;
  }

  .outro-circle {
    position: absolute;
